name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  SCCACHE_GHA_ENABLED: "true"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # Full history so pull-request runs can diff against the base commit
          # to lint only the files the branch changed (see "Determine changed
          # files" below).
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: ${{ runner.os }}-check-deps-${{ hashFiles('cmake/dependencies.cmake') }}
          restore-keys: |
            ${{ runner.os }}-check-deps-

      # Persist Doxygen's per-graph .md5/.svg cache for the internal docs so the
      # expensive call-graph render is reused across runs. A fresh key each run
      # (immutable caches can't be overwritten) with a rolling restore-keys
      # prefix means every run restores the previous run's graphs; Doxygen then
      # re-renders only the graphs whose content changed.
      - name: Cache internal docs graph cache
        uses: actions/cache@v5
        with:
          path: build/docs/internal
          key: ${{ runner.os }}-docs-internal-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docs-internal-

      # On pull requests, lint only the C/C++ files the branch touched; a
      # full-tree clang-tidy sweep is the single slowest step in CI. Pushes to
      # main leave the allow-list empty and lint everything.
      - name: Determine changed files
        id: changed
        if: github.event_name == 'pull_request'
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          files=$(git diff --name-only --diff-filter=ACMR "$base" HEAD -- \
                    '*.cpp' '*.hpp' '*.h' \
                  | sed "s|^|$GITHUB_WORKSPACE/|" | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"
          if [ -z "${files// /}" ]; then
            echo "No C/C++ files changed; clang-tidy/cpplint/cppcheck will be skipped."
          else
            echo "Linting changed files:"
            printf '  %s\n' $files
          fi

      # A single dev shell for configure + format + lint + docs, so the Nix
      # flake is evaluated and the shell instantiated once rather than once per
      # step. GitHub log groups keep the per-phase output readable.
      - name: Configure, lint, format-check, build docs
        env:
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
          IS_PR: ${{ github.event_name == 'pull_request' }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          nix develop --command bash -euo pipefail -c '
            args=(--preset debug)
            run_lint=true
            if [ "$IS_PR" = "true" ]; then
              if [ -n "${CHANGED_FILES// /}" ]; then
                list=$(echo "$CHANGED_FILES" | xargs | tr " " ";")
                args+=("-DCOUNTER_LINT_FILES_OVERRIDE=$list")
              else
                run_lint=false
              fi
            fi

            echo "::group::Configure"
            cmake "${args[@]}"
            echo "::endgroup::"

            echo "::group::Check formatting"
            cmake --build --preset debug --target format-ci
            echo "::endgroup::"

            if [ "$run_lint" = "true" ]; then
              echo "::group::Check linting"
              cmake --build --preset debug --target lint
              echo "::endgroup::"
            else
              echo "No C/C++ files changed; skipping lint."
            fi

            echo "::group::Build docs"
            cmake --build --preset debug --target docs
            echo "::endgroup::"
          '

  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - preset: debug
            build_dir: build
          - preset: debug
            build_dir: build
            compiler: gcc
            cmake_args: -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++
          - preset: release
            build_dir: build-release
          - preset: tsan
            build_dir: build-tsan

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache third-party dependencies
        uses: actions/cache@v5
        with:
          path: |
            ${{ matrix.build_dir }}/third_party
            ${{ matrix.build_dir }}/_deps
          key: ${{ runner.os }}-${{ matrix.preset }}-${{ matrix.compiler || 'clang' }}-third-party-${{ hashFiles('cmake/spot.cmake', 'cmake/ganak.cmake', 'cmake/black.cmake', 'cmake/dependencies.cmake') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.preset }}-${{ matrix.compiler || 'clang' }}-third-party-

      # Configure + build + test share one dev shell to amortise Nix flake
      # evaluation across the three phases.
      - name: Configure, build, test
        env:
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
        run: |
          nix develop --command bash -euo pipefail -c '
            echo "::group::Configure"
            cmake --preset ${{ matrix.preset }} ${{ matrix.cmake_args }}
            echo "::endgroup::"

            echo "::group::Build"
            cmake --build --preset ${{ matrix.preset }}
            echo "::endgroup::"

            echo "::group::Test"
            ctest --preset ${{ matrix.preset }}
            echo "::endgroup::"
          '

  benchmark:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache third-party dependencies
        uses: actions/cache@v5
        with:
          path: |
            build-bench/third_party
            build-bench/_deps
          key: ${{ runner.os }}-bench-${{ hashFiles('cmake/spot.cmake', 'cmake/ganak.cmake', 'cmake/black.cmake', 'bench/CMakeLists.txt', 'cmake/dependencies.cmake') }}
          restore-keys: |
            ${{ runner.os }}-bench-

      - name: Configure and build
        env:
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
        run: |
          nix develop --command bash -euo pipefail -c '
            echo "::group::Configure"
            cmake --preset bench
            echo "::endgroup::"

            echo "::group::Build"
            cmake --build --preset bench --target counter_bench
            echo "::endgroup::"
          '

      - name: Check regression assertions
        run: ./build-bench/bench/counter_bench --check-assertions

      - name: Run benchmarks
        run: |
          ./build-bench/bench/counter_bench \
            --benchmark_format=json \
            --benchmark_out=bench_results.json \
            --benchmark_time_unit=ns

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: counter benchmarks
          tool: googlecpp
          output-file-path: bench_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: .
