name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  SCCACHE_GHA_ENABLED: "true"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: ${{ runner.os }}-check-deps-${{ hashFiles('cmake/dependencies.cmake') }}
          restore-keys: |
            ${{ runner.os }}-check-deps-

      - name: Configure project
        run: nix develop --command cmake --preset debug
        env:
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache

      - name: Check formatting
        run: nix develop --command cmake --build --preset debug --target format-ci

      - name: Check linting
        run: nix develop --command cmake --build --preset debug --target lint

      - name: Build docs
        run: nix develop --command cmake --build --preset debug --target docs

  build-and-test:
    runs-on: ubuntu-latest
    needs: check

    strategy:
      matrix:
        include:
          - preset: debug
            build_dir: build
          - preset: debug
            build_dir: build
            compiler: gcc
            cmake_args: -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++
          - preset: release
            build_dir: build-release
          - preset: tsan
            build_dir: build-tsan

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache third-party dependencies
        uses: actions/cache@v5
        with:
          path: |
            ${{ matrix.build_dir }}/third_party
            ${{ matrix.build_dir }}/_deps
          key: ${{ runner.os }}-${{ matrix.preset }}-${{ matrix.compiler || 'clang' }}-third-party-${{ hashFiles('cmake/spot.cmake', 'cmake/ganak.cmake', 'cmake/black.cmake', 'cmake/dependencies.cmake') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.preset }}-${{ matrix.compiler || 'clang' }}-third-party-

      - name: Configure project
        run: nix develop --command cmake --preset ${{ matrix.preset }} ${{ matrix.cmake_args }}
        env:
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache

      - name: Build project
        run: nix develop --command cmake --build --preset ${{ matrix.preset }}

      - name: Run tests
        run: nix develop --command ctest --preset ${{ matrix.preset }}

  benchmark:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache third-party dependencies
        uses: actions/cache@v5
        with:
          path: |
            build-bench/third_party
            build-bench/_deps
          key: ${{ runner.os }}-bench-${{ hashFiles('cmake/spot.cmake', 'cmake/ganak.cmake', 'cmake/black.cmake', 'bench/CMakeLists.txt', 'cmake/dependencies.cmake') }}
          restore-keys: |
            ${{ runner.os }}-bench-

      - name: Configure and build
        run: |
          nix develop --command cmake --preset bench
          nix develop --command cmake --build --preset bench --target counter_bench
        env:
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache

      - name: Check regression assertions
        run: ./build-bench/bench/counter_bench --check-assertions

      - name: Run benchmarks
        run: |
          ./build-bench/bench/counter_bench \
            --benchmark_format=json \
            --benchmark_out=bench_results.json \
            --benchmark_time_unit=ns

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: counter benchmarks
          tool: googlecpp
          output-file-path: bench_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: .
