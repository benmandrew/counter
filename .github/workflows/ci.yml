name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install LLVM 21
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 21
          sudo ln -sf /usr/bin/clang-tidy-21 /usr/bin/clang-tidy
          sudo ln -sf /usr/bin/run-clang-tidy-21 /usr/bin/run-clang-tidy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfmt-dev doxygen graphviz libunwind-dev cppcheck

      - name: Install cpplint, Sphinx, and upgrade CMake
        run: |
          sudo apt-get remove --purge -y cmake
          python3 -m pip install --upgrade pip
          python3 -m pip install cpplint cmake sphinx furo breathe clang-format

      - name: Configure project
        run: cmake --preset debug

      - name: Check formatting
        run: cmake --build --preset debug --target format-ci

      - name: Check linting
        run: cmake --build --preset debug --target lint

      - name: Build docs
        run: cmake --build --preset debug --target docs

  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - preset: debug
            build_dir: build
          - preset: debug
            build_dir: build
            compiler: gcc
            cmake_args: -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++
          - preset: release
            build_dir: build-release
          - preset: tsan
            build_dir: build-tsan

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfmt-dev libunwind-dev

      - name: Upgrade CMake
        run: |
          sudo apt-get remove --purge -y cmake
          python3 -m pip install --upgrade pip cmake

      - name: Cache third-party dependencies
        uses: actions/cache@v5
        with:
          path: ${{ matrix.build_dir }}/third_party
          key: ${{ runner.os }}-${{ matrix.preset }}-${{ matrix.compiler || 'clang' }}-third-party-${{ hashFiles('cmake/spot.cmake', 'cmake/ganak.cmake', 'cmake/black.cmake') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.preset }}-${{ matrix.compiler || 'clang' }}-third-party-

      - name: Configure project
        run: cmake --preset ${{ matrix.preset }} ${{ matrix.cmake_args }}

      - name: Build project
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Run tests
        run: ctest --preset ${{ matrix.preset }}

  benchmark:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfmt-dev libunwind-dev

      - name: Upgrade CMake
        run: |
          sudo apt-get remove --purge -y cmake
          python3 -m pip install --upgrade pip cmake

      - name: Cache third-party dependencies
        uses: actions/cache@v5
        with:
          path: |
            build-bench/third_party
            build-bench/_deps
          key: ${{ runner.os }}-bench-${{ hashFiles('cmake/spot.cmake', 'cmake/ganak.cmake', 'cmake/black.cmake', 'bench/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-bench-

      - name: Configure and build
        run: |
          cmake --preset bench
          cmake --build --preset bench --target counter_bench

      - name: Check regression assertions
        run: ./build-bench/bench/counter_bench --check-assertions

      - name: Run benchmarks
        run: |
          ./build-bench/bench/counter_bench \
            --benchmark_format=json \
            --benchmark_out=bench_results.json \
            --benchmark_time_unit=ns

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: counter benchmarks
          tool: googlecpp
          output-file-path: bench_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: .
