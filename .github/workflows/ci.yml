name: CI

on:
  push:
    branches:
      - main
  pull_request:
  # Nightly exhaustive pass: full-tree lint sweep (catches header-fan-out that
  # the changed-file lint on PRs/pushes misses) and the benchmark run. 03:00 UTC.
  schedule:
    - cron: "0 3 * * *"
  # Manual trigger for an on-demand full sweep + benchmark.
  workflow_dispatch:

env:
  SCCACHE_GHA_ENABLED: "true"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # Full history so pull-request and push runs can diff against the base
          # commit to lint only the files the change touched (see "Determine
          # changed files" below).
          fetch-depth: 0

      # Decide up front -- before any Nix work -- whether this run has anything
      # to do. On pull requests and pushes to main we lint only the C/C++ files
      # the change touched and build docs only when a docs input changed; when
      # neither changed there is nothing to check, so every heavy step below is
      # skipped (via steps.changed.outputs.heavy) and the job finishes in
      # seconds without installing Nix. The nightly schedule and manual dispatch
      # skip this step, leaving the allow-list empty so the run lints the whole
      # tree and always builds docs.
      - name: Determine changed files
        id: changed
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          # Fall back to a full sweep when the base ref is unusable (branch
          # creation, force-push, or a base commit not in local history): lint
          # everything and build docs rather than silently linting nothing.
          if [ -z "$base" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "full=true" >> "$GITHUB_OUTPUT"
            echo "docs=true" >> "$GITHUB_OUTPUT"
            echo "heavy=true" >> "$GITHUB_OUTPUT"
            echo "No usable base ref ($base); running a full-tree lint + docs build."
            exit 0
          fi

          files=$(git diff --name-only --diff-filter=ACMR "$base" HEAD -- \
                    '*.cpp' '*.hpp' '*.h' \
                  | sed "s|^|$GITHUB_WORKSPACE/|" | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"

          # Docs are generated from include/ and src/ (Doxygen) and docs/
          # (Sphinx sources + Doxyfile templates); nothing else affects them.
          docs_changed=false
          if git diff --name-only --diff-filter=ACMR "$base" HEAD -- \
               include src docs | grep -q .; then
            docs_changed=true
          fi
          echo "docs=$docs_changed" >> "$GITHUB_OUTPUT"

          # "heavy" gates the Nix install, the caches, and the configure/lint/
          # docs step: true when there is a C/C++ file to lint or a docs input
          # to rebuild. When neither changed, the job skips straight to success.
          if [ -n "${files// /}" ] || [ "$docs_changed" = "true" ]; then
            echo "heavy=true" >> "$GITHUB_OUTPUT"
          else
            echo "heavy=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -z "${files// /}" ]; then
            echo "No C/C++ files changed; clang-tidy/cpplint/cppcheck will be skipped."
          else
            echo "Linting changed files:"
            printf '  %s\n' $files
          fi

      - name: Install Nix
        if: >-
          github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
          || steps.changed.outputs.heavy == 'true'
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up sccache
        if: >-
          github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
          || steps.changed.outputs.heavy == 'true'
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache FetchContent dependencies
        if: >-
          github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
          || steps.changed.outputs.heavy == 'true'
        uses: actions/cache@v5
        with:
          path: build/_deps
          # The generator is part of the key: FetchContent subbuild caches bake
          # in the generator, so a Makefiles-era cache can't be restored into a
          # Ninja configure ("generator does not match").
          key: ${{ runner.os }}-check-deps-ninja-${{ hashFiles('cmake/dependencies.cmake') }}
          restore-keys: |
            ${{ runner.os }}-check-deps-ninja-

      # clang-tidy result cache (ctcache): keyed on each TU's preprocessed
      # content + the .clang-tidy config, so unchanged translation units skip
      # re-analysis across runs. A fresh key each run (immutable caches can't be
      # overwritten) with a rolling restore-keys prefix restores the previous
      # run's results; only changed TUs are re-analysed. This is what keeps the
      # nightly full-tree sweep (and large PRs) cheap.
      - name: Cache clang-tidy results
        if: >-
          github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
          || steps.changed.outputs.heavy == 'true'
        uses: actions/cache@v5
        with:
          path: .ctcache
          key: ${{ runner.os }}-ctcache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ctcache-

      # Persist Doxygen's per-graph .md5/.svg cache for the internal docs so the
      # expensive call-graph render is reused across runs. A fresh key each run
      # (immutable caches can't be overwritten) with a rolling restore-keys
      # prefix means every run restores the previous run's graphs; Doxygen then
      # re-renders only the graphs whose content changed.
      - name: Cache internal docs graph cache
        if: >-
          github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
          || steps.changed.outputs.heavy == 'true'
        uses: actions/cache@v5
        with:
          path: build/docs/internal
          key: ${{ runner.os }}-docs-internal-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docs-internal-

      # A single dev shell for configure + format + lint + docs, so the Nix
      # flake is evaluated and the shell instantiated once rather than once per
      # step. GitHub log groups keep the per-phase output readable.
      - name: Configure, lint, format-check, build docs
        if: >-
          github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
          || steps.changed.outputs.heavy == 'true'
        env:
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
          # ctcache stores clang-tidy results here; the lint wiring is a no-op
          # when this is unset (see cmake/run_clang_tidy.cmake).
          CTCACHE_DIR: ${{ github.workspace }}/.ctcache
          EVENT: ${{ github.event_name }}
          FORCE_FULL: ${{ steps.changed.outputs.full }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
          DOCS_CHANGED: ${{ steps.changed.outputs.docs }}
        run: |
          nix develop --command bash -euo pipefail -c '
            # A full sweep lints the whole tree and always builds docs: the
            # nightly schedule, manual dispatch, and the unusable-base fallback.
            full_sweep=false
            if [ "$EVENT" = "schedule" ] || [ "$EVENT" = "workflow_dispatch" ] \
               || [ "$FORCE_FULL" = "true" ]; then
              full_sweep=true
            fi

            args=(--preset debug)
            run_lint=true
            if [ "$full_sweep" != "true" ]; then
              if [ -n "${CHANGED_FILES// /}" ]; then
                list=$(echo "$CHANGED_FILES" | xargs | tr " " ";")
                args+=("-DCOUNTER_LINT_FILES_OVERRIDE=$list")
              else
                run_lint=false
              fi
            fi

            build_docs=true
            if [ "$full_sweep" != "true" ] && [ "$DOCS_CHANGED" != "true" ]; then
              build_docs=false
            fi

            echo "::group::Configure"
            cmake "${args[@]}"
            echo "::endgroup::"

            echo "::group::Check formatting"
            cmake --build --preset debug --target format-ci
            echo "::endgroup::"

            if [ "$run_lint" = "true" ]; then
              echo "::group::Check linting"
              cmake --build --preset debug --target lint
              echo "::endgroup::"
            else
              echo "No C/C++ files changed; skipping lint."
            fi

            if [ "$build_docs" = "true" ]; then
              echo "::group::Build docs"
              cmake --build --preset debug --target docs
              echo "::endgroup::"
            else
              echo "No docs inputs changed; skipping docs build."
            fi
          '

  # Emit the build-and-test matrix as JSON so pull requests run a lean
  # debug+release pair while pushes to main, the nightly schedule, and manual
  # dispatch add the gcc (portability) and tsan (data-race) configurations.
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Compute matrix
        id: set
        run: |
          debug='{"preset":"debug","build_dir":"build"}'
          release='{"preset":"release","build_dir":"build-release"}'
          gcc='{"preset":"debug","build_dir":"build","compiler":"gcc","cmake_args":"-DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++"}'
          tsan='{"preset":"tsan","build_dir":"build-tsan"}'
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            include="$debug,$release"
          else
            include="$debug,$gcc,$release,$tsan"
          fi
          echo "matrix={\"include\":[$include]}" >> "$GITHUB_OUTPUT"

  build-and-test:
    needs: build-matrix
    runs-on: ubuntu-latest

    strategy:
      matrix: ${{ fromJSON(needs.build-matrix.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache third-party dependencies
        uses: actions/cache@v5
        with:
          path: |
            ${{ matrix.build_dir }}/third_party
            ${{ matrix.build_dir }}/_deps
          key: ${{ runner.os }}-${{ matrix.preset }}-${{ matrix.compiler || 'clang' }}-third-party-ninja-${{ hashFiles('cmake/spot.cmake', 'cmake/ganak.cmake', 'cmake/black.cmake', 'cmake/dependencies.cmake') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.preset }}-${{ matrix.compiler || 'clang' }}-third-party-ninja-

      # Configure + build + test share one dev shell to amortise Nix flake
      # evaluation across the three phases.
      - name: Configure, build, test
        env:
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
        run: |
          nix develop --command bash -euo pipefail -c '
            echo "::group::Configure"
            cmake --preset ${{ matrix.preset }} ${{ matrix.cmake_args }}
            echo "::endgroup::"

            echo "::group::Build"
            cmake --build --preset ${{ matrix.preset }}
            echo "::endgroup::"

            echo "::group::Test"
            ctest --preset ${{ matrix.preset }}
            echo "::endgroup::"
          '

  # Benchmarks run only on the nightly schedule (and manual dispatch), and only
  # when new commits landed since the previous run: re-benchmarking an unchanged
  # tree just adds a runner-noise datapoint to the history. Absolute ns/iter is
  # compared across runner instances, so this is advisory (fail-on-alert: false)
  # and was never a merge gate.
  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      # comment-on-alert posts a PR review, which contents: write does not cover.
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      # Skip the run when HEAD is older than the nightly cadence: no new commits
      # means nothing new to benchmark. Manual dispatch always runs.
      - name: Check for recent commits
        id: recent
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          committed=$(git log -1 --format=%ct)
          now=$(date +%s)
          age=$(( now - committed ))
          # 25h of slack over the 24h cron so a slightly-late trigger still runs.
          if [ "$age" -lt 90000 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "HEAD committed ${age}s ago; running benchmarks."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No commits in the last 25h; skipping benchmarks."
          fi

      - name: Install Nix
        if: steps.recent.outputs.run == 'true'
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up sccache
        if: steps.recent.outputs.run == 'true'
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache third-party dependencies
        if: steps.recent.outputs.run == 'true'
        uses: actions/cache@v5
        with:
          path: |
            build-bench/third_party
            build-bench/_deps
          key: ${{ runner.os }}-bench-ninja-${{ hashFiles('cmake/spot.cmake', 'cmake/ganak.cmake', 'cmake/black.cmake', 'bench/CMakeLists.txt', 'cmake/dependencies.cmake') }}
          restore-keys: |
            ${{ runner.os }}-bench-ninja-

      - name: Configure and build
        if: steps.recent.outputs.run == 'true'
        env:
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
        run: |
          nix develop --command bash -euo pipefail -c '
            echo "::group::Configure"
            cmake --preset bench
            echo "::endgroup::"

            echo "::group::Build"
            cmake --build --preset bench --target counter_bench
            echo "::endgroup::"
          '

      - name: Check regression assertions
        if: steps.recent.outputs.run == 'true'
        run: ./build-bench/bench/counter_bench --check-assertions

      - name: Run benchmarks
        if: steps.recent.outputs.run == 'true'
        run: |
          ./build-bench/bench/counter_bench \
            --benchmark_format=json \
            --benchmark_out=bench_results.json \
            --benchmark_time_unit=ns

      - name: Store benchmark results
        if: steps.recent.outputs.run == 'true'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: counter benchmarks
          tool: googlecpp
          output-file-path: bench_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          alert-threshold: '150%'
          comment-on-alert: true
          # Absolute ns/iter is compared across runner instances, so host
          # contention alone moves every benchmark by more than the threshold.
          # Alert, but do not fail the build on it.
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: .
