#:schema ./schemas/config-schema.json
# counter configuration file
# All sections and keys are optional; absent keys use the built-in defaults.

[genetic]
generations     = 10    # number of evolution rounds
population_size = 1000  # candidates per generation
selection_rate  = 0.5   # fraction of population selected as parents each generation
elitism_rate    = 0.1   # fraction carried over verbatim each generation (must be < selection_rate)
crossover_rate  = 0.1   # probability of crossover between parents
mutation_rate   = 0.8   # probability of mutating an offspring
# Selection scheme:
#   "nsga2" (default) ranks by Pareto non-domination and crowding distance over
#     the individual components, searching for the Pareto front of repairs
#     rather than one weighted compromise. The [fitness] weights only select
#     which components are active (weight > 0); they no longer bias selection.
#     NSGA-II's (mu+lambda) survivor pooling is already elitist, so
#     elitism_rate = 0 is the natural setting.
#   "weighted" ranks candidates by the single weighted-average of the fitness
#     components (the [fitness] weights below). It converges prematurely: over a
#     50k-run parameter sweep the generation count made no difference to its
#     results at any level from 5 to 80, and on the takeoff example it matched
#     an ideal repair in 1.7% of runs against NSGA-II's 89.3%, while being no
#     faster.
selection_scheme = "nsga2"

[fitness]
weight_syntactic = 0.33  # syntactic similarity component weight
weight_semantic  = 0.33  # semantic similarity (model counting) component weight
weight_halstead  = 0.1   # Halstead complexity penalty weight
weight_status    = 0.33  # realizability status weight

[syntactic]
weight_trigger  = 1.0   # contribution of trigger formula similarity
weight_response = 1.0   # contribution of response formula similarity
weight_timing   = 1.0   # contribution of timing constraint similarity

[mutation]
p_trigger  = 0.5    # per-requirement probability of mutating the trigger
p_response = 0.1    # per-requirement probability of mutating the response
p_timing   = 0.1    # per-requirement probability of mutating the timing
# Shared by both modes: probability that a mutation instead appends a new
# environment assumption (a fairness assumption over an input) rather than
# rewriting an existing requirement/formula. Enables repairs that require
# strengthening the environment (e.g. adding request fairness to an
# unrealizable GR(1) spec).
p_add_assumption = 0.05
# Of those appended assumptions, the fraction guarded by a random input atom
# rather than by `true`. G F <input> is strictly stronger than
# G(c -> F <input>) and so the more powerful repair, which is why the
# unconditional form keeps the majority of the draw.
p_conditional_assumption = 0.25
# Mutate assumption timings in the strengthening direction rather than the
# weakening one: weakening the overall assume-guarantee specification means
# weakening a guarantee but strengthening an assumption. Setting this false
# weakens both, which makes every assumption mutation a move away from a
# repair; kept only so the two directions can be compared.
strengthen_assumptions = true
# When true, freshly added environment assumptions may reference output atoms as
# well as inputs; false (the default) keeps them input-only and so well-separated
# by construction. Pair with filters.run_well_separation, which prunes any
# not-well-separated assumption the wider draw produces.
allow_output_assumptions = false

[tlsf]
# Applies only in TLSF mode (a .tlsf input or --format tlsf).
# Repair strategy:
#   "monolithic" (default) evolves the whole specification at once.
#   "muc" repairs iteratively — extract a minimal unrealizable core, evolve only
#   that sub-specification, reintegrate the repaired core with the untouched
#   non-core guarantees, and repeat until the whole spec is realizable. Focuses
#   the search (and the per-candidate ltlsynt cost) on the culprit formulae.
repair_mode = "monolithic"
# muc mode only: cap on the outer extract-repair-reintegrate loop. A spec whose
# core never becomes realizable ends the run without a repair rather than
# looping forever.
muc_max_iterations = 32

[tlsf.mutation]
# Applies only in TLSF mode (a .tlsf input or --format tlsf). Probability of
# mutating an assumption-side section (INITIALLY/REQUIRE/ASSUME) versus a
# guarantee-side section (PRESET/ASSERT/GUARANTEE).
p_assumption = 0.3
p_guarantee  = 0.7
# Once a section formula is chosen, probability of applying the temporal-structure
# mutation (may insert/drop/swap X/F/G/U/R/W operators) rather than the
# skeleton-preserving propositional rewrite. At 0 temporal skeletons are fixed.
p_temporal   = 0.2

[model_counting]
default_bound = 10       # trace-length bound k for bounded model counting
metric        = "logarithmic" # default; "logarithmic" (growth-rate ratio; stays
                         # stable as the bound grows) or "direct" (count ratio)

[filters]
run_weakening   = true  # enable per-generation weakening filter
run_implication = true  # enable final implication maximality filter
# Drop candidates whose assumptions are jointly unsatisfiable. Those are
# realizable for free, since a false antecedent makes the assume-guarantee
# implication a tautology. Costs nothing when there are no assumptions.
run_vacuity     = true
# Drop candidates that are not well-separated: ones the system can satisfy
# vacuously by forcing its own assumptions to fail (i.e. (assumptions) -> false
# is realizable). Strictly stronger than run_vacuity, but each test is a full
# ltlsynt query, so it is off by default and the interval below throttles it.
run_well_separation = false

# How often each per-generation filter runs, in generations (1 = every
# generation). The final generation always runs every filter.
[filters.intervals]
dedup           = 1
false_condition = 1
weakening       = 3
bloat           = 1
vacuity         = 1
well_separation = 1

[runtime]
black_timeout_ms = 1000  # timeout per black SAT query in milliseconds
# Per-call ltlsynt realizability timeout in ms. 0 (default) is no timeout;
# ltlsynt has no internal one, so on hard specs a single synthesis query can run
# for minutes. A call exceeding this is killed and treated as unrealizable.
# ltlsynt_timeout_ms = 30000
# parallel         = 8     # thread pool size (omit to use hardware concurrency)
# Cap on ltlsynt processes running at once, independent of the thread pool. 0
# (default) is unlimited; ltlsynt is multi-GB resident per call on hard specs,
# so a positive value bounds peak RAM (roughly cap * per-call GB) to avoid OOM.
# max_concurrent_realizability = 6
# An individual whose fitness scoring throws is dropped from its generation
# rather than aborting the run. Above this fraction of a generation the tooling
# is assumed broken rather than the formula, and the run aborts. A single
# failure per generation is always tolerated, whatever the population size.
# max_scoring_failure_rate = 0.05
