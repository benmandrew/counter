#:schema ./schemas/config-schema.json
# counter configuration file
# All sections and keys are optional; absent keys use the built-in defaults.

[genetic]
generations     = 10    # number of evolution rounds
population_size = 1000  # candidates per generation
selection_rate  = 0.5   # fraction of population selected as parents each generation
elitism_rate    = 0.1   # fraction carried over verbatim each generation (must be < selection_rate)
crossover_rate  = 0.1   # probability of crossover between parents
mutation_rate   = 0.8   # probability of mutating an offspring
# Selection scheme:
#   "weighted" (default) ranks candidates by the single weighted-average of the
#     fitness components (the [fitness] weights below).
#   "nsga2" ranks by Pareto non-domination and crowding distance over the
#     individual components, searching for the Pareto front of repairs rather
#     than one weighted compromise. Under "nsga2" the [fitness] weights only
#     select which components are active (weight > 0); they no longer bias
#     selection. NSGA-II's (mu+lambda) survivor pooling is already elitist, so
#     elitism_rate = 0 is the natural setting.
selection_scheme = "weighted"

[fitness]
weight_syntactic = 0.33  # syntactic similarity component weight
weight_semantic  = 0.33  # semantic similarity (model counting) component weight
weight_halstead  = 0.1   # Halstead complexity penalty weight
weight_status    = 0.33  # realizability status weight

[syntactic]
weight_trigger  = 1.0   # contribution of trigger formula similarity
weight_response = 1.0   # contribution of response formula similarity
weight_timing   = 1.0   # contribution of timing constraint similarity

[mutation]
p_trigger  = 0.5    # per-requirement probability of mutating the trigger
p_response = 0.1    # per-requirement probability of mutating the response
p_timing   = 0.1    # per-requirement probability of mutating the timing
# Shared by both modes: probability that a mutation instead appends a new
# environment assumption (a fairness assumption over an input) rather than
# rewriting an existing requirement/formula. Enables repairs that require
# strengthening the environment (e.g. adding request fairness to an
# unrealizable GR(1) spec).
p_add_assumption = 0.05

[tlsf.mutation]
# Applies only in TLSF mode (a .tlsf input or --format tlsf). Probability of
# mutating an assumption-side section (INITIALLY/REQUIRE/ASSUME) versus a
# guarantee-side section (PRESET/ASSERT/GUARANTEE).
p_assumption = 0.3
p_guarantee  = 0.7
# Once a section formula is chosen, probability of applying the temporal-structure
# mutation (may insert/drop/swap X/F/G/U/R/W operators) rather than the
# skeleton-preserving propositional rewrite. At 0 temporal skeletons are fixed.
p_temporal   = 0.2

[model_counting]
default_bound = 10  # trace-length bound k for bounded model counting

[filters]
run_weakening   = true  # enable per-generation weakening filter
run_implication = true  # enable final implication maximality filter

# How often each per-generation filter runs, in generations (1 = every
# generation). The final generation always runs every filter.
[filters.intervals]
dedup           = 1
false_condition = 1
weakening       = 3
bloat           = 1

[runtime]
black_timeout_ms = 1000  # timeout per black SAT query in milliseconds
# parallel         = 8     # thread pool size (omit to use hardware concurrency)
